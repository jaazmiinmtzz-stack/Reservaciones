<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrestaControl Pro | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: #cbd5e1; }
        .panel-cobalto { background-color: #1e293b; border: 1px solid #334155; border-radius: 1rem; }
        input, select { transition: all 0.2s ease; background-color: #111827 !important; border: 1px solid #334155 !important; color: #f1f5f9 !important; }
        .modal { display: none !important; position: fixed; z-index: 100; inset: 0; background: rgba(2, 6, 17, 0.8); backdrop-filter: blur(4px); }
        .modal.flex { display: flex !important; }
        table tbody tr:hover { background-color: #1e293b; }
        .status-finalizado { opacity: 0.6; grayscale: 100%; }
    </style>
</head>
<body class="text-slate-300">

    <div id="mainModal" class="modal items-center justify-center p-4">
        <div class="modal-content bg-slate-900 rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden border border-slate-700">
            <div class="bg-gray-950 p-6 flex justify-between items-center border-b border-slate-700">
                <div>
                    <p class="text-[10px] text-teal-400 font-bold uppercase tracking-widest mb-1" id="modalUser">Usuario</p>
                    <h3 class="text-lg font-extrabold text-white" id="modalTitle">TÍTULO</h3>
                </div>
                <button onclick="cerrarModal()" class="text-slate-400 hover:text-white text-2xl">&times;</button>
            </div>
            <div class="p-8 max-h-[60vh] overflow-y-auto" id="modalBody"></div>
            <div class="p-6 bg-gray-950 border-t border-slate-700 flex justify-end gap-3">
                <button onclick="cerrarModal()" class="px-5 py-2 text-slate-400 font-bold">Cancelar</button>
                <button id="btnGuardar" class="px-8 py-2.5 bg-teal-600 hover:bg-teal-500 text-slate-950 rounded-xl font-extrabold shadow-md">Confirmar</button>
            </div>
        </div>
    </div>

    <nav class="bg-gray-950 px-6 py-4 sticky top-0 z-40 border-b border-slate-700">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-2xl">🏦</span>
                <h1 class="text-lg font-black text-white uppercase tracking-tighter">Presta<span class="text-teal-400">Control</span></h1>
            </div>
            <div class="flex items-center gap-6">
                <div id="totalGlobalBox" class="hidden text-right">
                    <p class="text-[9px] text-slate-500 font-black uppercase">Cartera Total Activa</p>
                    <p id="totalPrestadoValue" class="text-teal-400 font-black text-lg leading-none">$0</p>
                </div>
                <button id="adminBtn" onclick="toggleAdmin()" class="text-[10px] bg-slate-800 text-slate-300 px-5 py-2.5 rounded-xl border border-slate-600 font-bold uppercase">🔒 Acceso Admin</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="panel-cobalto mb-8 overflow-hidden">
            <form id="loanForm" class="p-8 grid grid-cols-1 md:grid-cols-12 gap-6">
                <div class="md:col-span-4">
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Deudor</label>
                    <input type="text" id="debtor" class="w-full p-3.5 rounded-xl text-sm" required>
                </div>
                <div class="md:col-span-3">
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Monto y %</label>
                    <div class="flex gap-2">
                        <input type="number" id="amount" class="w-full p-3.5 rounded-xl text-sm font-bold" required>
                        <select id="interest" class="p-3.5 rounded-xl text-sm font-black">
                            <option value="5">5%</option>
                            <option value="10" selected>10%</option>
                            <option value="15">15%</option>
                            <option value="20">20%</option>
                        </select>
                    </div>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Fecha Inicio</label>
                    <input type="date" id="startDate" class="w-full p-3.5 rounded-xl text-sm" required>
                </div>
                <div class="md:col-span-3">
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Vencimiento</label>
                    <input type="date" id="dueDate" class="w-full p-3.5 rounded-xl text-sm" required>
                </div>
                <button type="submit" class="md:col-span-12 bg-gray-950 border border-teal-800 hover:bg-teal-900 text-teal-400 font-black py-4 rounded-2xl transition-all uppercase text-[11px] tracking-widest">Registrar Préstamo</button>
            </form>
        </div>

        <div class="panel-cobalto overflow-hidden shadow-2xl">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-slate-800">
                    <thead class="bg-gray-950">
                        <tr>
                            <th class="px-6 py-5 text-left text-[10px] font-black text-slate-400 uppercase tracking-widest">Deudor</th>
                            <th class="px-6 py-5 text-center text-[10px] font-black text-slate-400 uppercase tracking-widest">Captura</th>
                            <th class="px-6 py-5 text-right text-[10px] font-black text-slate-400 uppercase tracking-widest">Capital</th>
                            <th class="px-6 py-5 text-center text-[10px] font-black text-teal-500 uppercase tracking-widest">%</th>
                            <th class="px-6 py-5 text-right text-[10px] font-black text-slate-400 uppercase tracking-widest">Rédito</th>
                            <th class="px-6 py-5 text-right text-[10px] font-black text-teal-400 uppercase tracking-widest">Atraso</th>
                            <th class="px-6 py-5 text-center text-[10px] font-black text-slate-400 uppercase tracking-widest">Vencimiento</th>
                        </tr>
                    </thead>
                    <tbody id="loanList" class="divide-y divide-slate-800"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, orderBy, query, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "prestamos-a35bb.firebaseapp.com",
            projectId: "prestamos-a35bb",
            storageBucket: "prestamos-a35bb.appspot.com",
            messagingSenderId: "TU_SENDER_ID",
            appId: "TU_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let esAdmin = false;

        const fFecha = (f) => f ? new Date(f + "T12:00:00").toLocaleDateString('es-ES', { day: '2-digit', month: 'short' }) : "---";

        function mesesTranscurridos(fecha) {
            const inicio = new Date(fecha + "T12:00:00");
            const hoy = new Date();
            let meses = (hoy.getFullYear() - inicio.getFullYear()) * 12;
            meses -= inicio.getMonth();
            meses += hoy.getMonth();
            if (hoy.getDate() < inicio.getDate()) meses--;
            return meses > 0 ? meses : 0;
        }

        window.cerrarModal = () => document.getElementById('mainModal').classList.remove('flex');

        window.toggleAdmin = () => {
            if (!esAdmin) {
                const pass = prompt("Clave Admin:");
                if(pass === "3010") {
                    esAdmin = true;
                    document.getElementById('adminBtn').innerHTML = `<span class="text-teal-400">●</span> SALIR ADMIN`;
                    document.getElementById('totalGlobalBox').classList.remove('hidden');
                }
            } else {
                esAdmin = false;
                document.getElementById('adminBtn').innerHTML = `🔒 Acceso Admin`;
                document.getElementById('totalGlobalBox').classList.add('hidden');
            }
            cargarDatos();
        };

        async function cargarDatos() {
            onSnapshot(query(collection(db, "prestamos"), orderBy("timestamp", "desc")), async (snap) => {
                const lista = document.getElementById('loanList');
                lista.innerHTML = ""; let totalG = 0;
                
                for (const docu of snap.docs) {
                    const item = docu.data(); const id = docu.id; 
                    const isFinalizado = item.finalizado === true;
                    
                    if(!isFinalizado) totalG += item.capital;
                    
                    const mesesDebidos = mesesTranscurridos(item.fechaInicio);
                    const totalQueDebioPagar = mesesDebidos * item.redito;
                    
                    const reditosSnap = await getDocs(collection(db, "prestamos", id, "historial_reditos"));
                    let loQueYaNoDebe = 0;
                    reditosSnap.forEach(r => { loQueYaNoDebe += Number(r.data().valorContable || r.data().monto); });
                    
                    // Si está finalizado, el saldo siempre es 0
                    const saldoFinal = isFinalizado ? 0 : Math.max(0, totalQueDebioPagar - loQueYaNoDebe);

                    let botones = '';
                    if (esAdmin) {
                        if (!isFinalizado) {
                            botones = `
                            <div class="flex gap-1.5 mt-3 flex-wrap">
                                <button onclick="formPago('${id}', '${item.nombre}', ${item.redito})" class="bg-teal-600 text-slate-950 px-2 py-1 rounded text-[9px] font-bold uppercase">Pagar</button>
                                <button onclick="condonarRedito('${id}', '${item.nombre}', ${item.redito})" class="bg-orange-600/20 text-orange-400 border border-orange-800 px-2 py-1 rounded text-[9px] font-bold uppercase">Condonar</button>
                                <button onclick="verHistorial('${id}', '${item.nombre}')" class="bg-slate-700 text-white px-2 py-1 rounded text-[9px] font-bold uppercase">Historial</button>
                                <button onclick="formEditGral('${id}', '${item.nombre}', ${item.capital}, '${item.fechaInicio}', '${item.vencimiento}', ${item.tasa})" class="bg-slate-700 text-white px-2 py-1 rounded text-[9px] font-bold uppercase">Editar</button>
                                <button onclick="marcarComoPagado('${id}', '${item.nombre}')" class="bg-teal-900/50 text-teal-300 border border-teal-700 px-2 py-1 rounded text-[9px] font-bold uppercase">Liquidar</button>
                                <button onclick="eliminarRegistro('${id}', '${item.nombre}')" class="bg-red-900/40 text-red-400 border border-red-800 px-2 py-1 rounded text-[9px] font-bold uppercase">Borrar</button>
                            </div>`;
                        } else {
                            botones = `
                            <div class="flex gap-1.5 mt-3">
                                <span class="text-[10px] font-bold text-teal-500 uppercase tracking-widest italic">✓ Préstamo Liquidado</span>
                                <button onclick="eliminarRegistro('${id}', '${item.nombre}')" class="bg-red-900/20 text-red-400 px-2 py-1 rounded text-[9px] font-bold uppercase">Eliminar Registro</button>
                            </div>`;
                        }
                    }

                    lista.innerHTML += `
                        <tr class="border-b border-slate-800 ${isFinalizado ? 'status-finalizado' : ''}">
                            <td class="px-6 py-5">
                                <div class="flex items-center gap-2">
                                    <p class="font-bold text-white uppercase text-sm">${item.nombre}</p>
                                    ${isFinalizado ? '<span class="bg-teal-500 text-slate-900 text-[8px] px-1.5 py-0.5 rounded-full font-black">PAGADO</span>' : ''}
                                </div>
                                ${botones}
                            </td>
                            <td class="px-6 py-5 text-center text-xs">${fFecha(item.fechaInicio)}</td>
                            <td class="px-6 py-5 text-right font-bold text-slate-100">$${item.capital.toLocaleString()}</td>
                            <td class="px-6 py-5 text-center"><span class="text-teal-400 font-black text-[10px]">${item.tasa}%</span></td>
                            <td class="px-6 py-5 text-right text-slate-400 font-bold">$${item.redito.toLocaleString()}</td>
                            <td class="px-6 py-5 text-right">
                                <p class="${saldoFinal > 0 ? 'text-red-400' : 'text-teal-500'} font-black text-base">$${saldoFinal.toLocaleString()}</p>
                            </td>
                            <td class="px-6 py-5 text-center text-xs text-slate-500">${fFecha(item.vencimiento)}</td>
                        </tr>`;
                }
                document.getElementById('totalPrestadoValue').innerText = `$${totalG.toLocaleString()}`;
            });
        }

        // --- NUEVA FUNCIÓN: MARCAR COMO PAGADO ---
        window.marcarComoPagado = async (id, nombre) => {
            if(confirm(`¿Confirmas que ${nombre} ha liquidado la totalidad de la deuda? Esto bloqueará futuras ediciones.`)) {
                await updateDoc(doc(db, "prestamos", id), { 
                    finalizado: true,
                    fechaCierre: new Date().toISOString().split('T')[0]
                });
            }
        };

        window.formEditGral = (id, nombre, capital, fechaIni, fechaVen, tasa) => {
            document.getElementById('modalTitle').innerText = "Editar Préstamo";
            document.getElementById('modalUser').innerText = nombre;
            document.getElementById('modalBody').innerHTML = `
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase">Nuevo Capital</label>
                        <input type="number" id="editCap" value="${capital}" class="w-full p-4 rounded-xl bg-gray-950 text-teal-400 font-bold text-xl">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase">Nueva Fecha Inicio</label>
                        <input type="date" id="editFechaIni" value="${fechaIni}" class="w-full p-4 rounded-xl bg-gray-950 text-white">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase">Nueva Fecha Vencimiento</label>
                        <input type="date" id="editFechaVen" value="${fechaVen || ''}" class="w-full p-4 rounded-xl bg-gray-950 text-white">
                    </div>
                </div>
            `;
            document.getElementById('btnGuardar').onclick = async () => {
                const nCap = Number(document.getElementById('editCap').value);
                const nFechaI = document.getElementById('editFechaIni').value;
                const nFechaV = document.getElementById('editFechaVen').value;
                await updateDoc(doc(db, "prestamos", id), { 
                    capital: nCap, 
                    fechaInicio: nFechaI,
                    vencimiento: nFechaV,
                    redito: nCap * (tasa / 100) 
                });
                cerrarModal();
            };
            document.getElementById('mainModal').classList.add('flex');
        };

        window.formPago = (id, nombre, redito) => {
            document.getElementById('modalTitle').innerText = "Registrar Pago";
            document.getElementById('modalUser').innerText = nombre;
            document.getElementById('modalBody').innerHTML = `
                <input type="number" id="mRedito" value="${redito}" class="w-full p-4 rounded-xl bg-gray-950 text-teal-400 font-bold text-xl mb-4">
                <input type="date" id="fRedito" value="${new Date().toISOString().split('T')[0]}" class="w-full p-4 rounded-xl bg-gray-950 text-white">
            `;
            document.getElementById('btnGuardar').onclick = async () => {
                await addDoc(collection(db, "prestamos", id, "historial_reditos"), { 
                    monto: Number(document.getElementById('mRedito').value), 
                    valorContable: Number(document.getElementById('mRedito').value), 
                    fecha: document.getElementById('fRedito').value, 
                    timestamp: new Date() 
                });
                cerrarModal();
            };
            document.getElementById('mainModal').classList.add('flex');
        };

        window.condonarRedito = (id, nombre, redito) => {
            if(confirm(`¿Condonar un mes ($${redito}) a ${nombre}?`)) {
                addDoc(collection(db, "prestamos", id, "historial_reditos"), { 
                    monto: 0, valorContable: redito, nota: "Condonado", 
                    fecha: new Date().toISOString().split('T')[0], timestamp: new Date() 
                });
            }
        };

        window.verHistorial = async (id, nombre) => {
            const snap = await getDocs(query(collection(db, "prestamos", id, "historial_reditos"), orderBy("timestamp", "desc")));
            let html = '';
            snap.forEach(d => {
                const p = d.data();
                html += `<div class="p-3 bg-gray-950 border border-slate-800 rounded-lg mb-2 flex justify-between items-center">
                    <div><p class="text-xs text-slate-500">${fFecha(p.fecha)}</p><p class="font-bold text-teal-400">$${p.monto.toLocaleString()}</p></div>
                    <button onclick="borrarHistorialItem('${id}','${d.id}')" class="text-red-500 text-xs uppercase font-bold">Borrar</button>
                </div>`;
            });
            document.getElementById('modalTitle').innerText = "Historial de Pagos";
            document.getElementById('modalUser').innerText = nombre;
            document.getElementById('modalBody').innerHTML = html || '<p class="text-center text-slate-500">Sin movimientos</p>';
            document.getElementById('btnGuardar').style.display = 'none';
            document.getElementById('mainModal').classList.add('flex');
        };

        window.borrarHistorialItem = async (pid, rid) => { 
            if(confirm("¿Borrar este pago?")) { 
                await deleteDoc(doc(db, "prestamos", pid, "historial_reditos", rid)); 
                cerrarModal(); 
            } 
        };

        window.eliminarRegistro = async (id, nombre) => { 
            if(confirm(`¿ELIMINAR TODO EL REGISTRO DE ${nombre}?`)) {
                await deleteDoc(doc(db, "prestamos", id)); 
            }
        };

        document.getElementById('loanForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const cap = Number(document.getElementById('amount').value);
            const tasa = Number(document.getElementById('interest').value);
            await addDoc(collection(db, "prestamos"), {
                nombre: document.getElementById('debtor').value, 
                capital: cap, 
                tasa: tasa, 
                redito: cap * (tasa / 100),
                fechaInicio: document.getElementById('startDate').value, 
                vencimiento: document.getElementById('dueDate').value, 
                timestamp: new Date(),
                finalizado: false
            });
            e.target.reset();
        });

        cargarDatos();
    </script>
</body>
</html>
